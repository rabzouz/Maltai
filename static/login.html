<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#14161a" />
  <link rel="icon" type="image/png" href="/static/favicon.png" />
  <title>MaltaiAI — Connexion</title>
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    .login-wrap { display:flex; align-items:center; justify-content:center; height:100vh; }
    .login-box {
      background: var(--panel); border:1px solid var(--border); border-radius:16px;
      padding: 34px 32px; width: 360px; max-width: 90vw;
      display:flex; flex-direction:column; gap:12px;
    }
    .login-box h1 { margin:0 0 4px; font-size:26px; text-align:center; }
    .login-box .logo { display:block; text-align:center; font-size:38px; color:var(--accent); }
    .login-box input {
      background: var(--panel-2); color: var(--text); border:1px solid var(--border);
      border-radius:9px; padding:12px 14px; font-size:15px;
    }
    .login-box input:focus { outline:none; border-color: var(--accent-2); }
    .login-error { color:#ff8585; font-size:13px; min-height:18px; text-align:center; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <form class="login-box" id="login-form">
      <img src="/static/logo-emblem.png" alt="Maltai" style="width:84px;height:84px;border-radius:20px;display:block;margin:0 auto 4px;" />
      <h1>Maltai<span style="color:#2bd4f0">AI</span></h1>
      <input id="username" placeholder="Utilisateur" autocomplete="username" autofocus />
      <input id="password" type="password" placeholder="Mot de passe" autocomplete="current-password" />
      <div class="login-error" id="error"></div>
      <button class="btn-primary" type="submit">Se connecter</button>
    </form>
  </div>
  <script>
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const err = document.getElementById("error");
      err.textContent = "";
      const r = await fetch("/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          username: document.getElementById("username").value,
          password: document.getElementById("password").value,
        }),
      });
      if (r.ok) { location.href = "/"; }
      else {
        const d = await r.json().catch(() => ({}));
        err.textContent = d.detail || "Erreur de connexion";
      }
    });
  </script>
</body>
</html>
