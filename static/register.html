<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0d14" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/png" href="/static/favicon.png" />
  <title>MaltaiAI — Inscription</title>
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    .auth-wrap {
      display:flex; align-items:center; justify-content:center;
      min-height:100vh; padding:24px 16px;
      background:
        radial-gradient(1100px 520px at 50% -10%, rgba(0,212,196,0.12), transparent 70%),
        var(--bg);
    }
    .auth-box {
      background: var(--panel); border:1px solid var(--border); border-radius:18px;
      padding: 34px 30px; width: 390px; max-width: 100%;
      display:flex; flex-direction:column; gap:14px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.45);
    }
    .auth-box h1 { margin:2px 0 2px; font-size:25px; text-align:center; }
    .auth-logo { width:78px; height:78px; border-radius:20px; display:block; margin:0 auto; }
    .auth-sub { margin:0 0 4px; color:var(--muted); text-align:center; font-size:13px; line-height:1.5; }
    .field { display:flex; flex-direction:column; gap:6px; }
    .field label { font-size:12.5px; font-weight:700; color:var(--muted); }
    .auth-box input {
      background: var(--panel-2); color: var(--text); border:1px solid var(--border);
      border-radius:10px; padding:12px 14px; font-size:15px; width:100%;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    .auth-box input:focus {
      outline:none; border-color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 28%, transparent);
    }
    .hint { font-size:11.5px; color:var(--muted); opacity:0.85; }
    .pw-field { position:relative; }
    .pw-toggle {
      position:absolute; right:8px; bottom:6px; height:30px; padding:0 10px;
      background:none; border:none; color:var(--muted); font-size:12.5px;
      font-weight:700; cursor:pointer; border-radius:6px;
    }
    .pw-toggle:hover { color:var(--text); background:rgba(255,255,255,0.06); }
    .auth-error { color:#ff8585; font-size:13px; min-height:18px; text-align:center; }
    button.btn-primary { border-radius:10px; padding:12px; font-size:15px; }
    .auth-link { color: var(--muted); font-size: 13px; text-align: center; }
    .auth-link a { color: var(--accent); font-weight: 800; text-decoration: none; }
    .auth-link a:hover { text-decoration: underline; }
    .auth-back { text-align:center; }
    .auth-back a { color: var(--muted); font-size:12.5px; text-decoration:none; }
    .auth-back a:hover { color: var(--text); }
    a:focus-visible, button:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
  </style>
</head>
<body>
  <main class="auth-wrap">
    <form class="auth-box" id="register-form" novalidate>
      <img class="auth-logo" src="/static/logo-emblem.png" alt="MaltaiAI" width="78" height="78" />
      <h1>Créer un compte</h1>
      <p class="auth-sub">Le compte démarre en plan Basic. Un administrateur peut ensuite activer Premium.</p>

      <div class="field">
        <label for="username">Utilisateur</label>
        <input id="username" name="username" placeholder="3 caractères minimum" autocomplete="username" autofocus required />
        <span class="hint">Lettres, chiffres, tiret ou underscore.</span>
      </div>

      <div class="field">
        <label for="password">Mot de passe</label>
        <div class="pw-field">
          <input id="password" name="password" type="password" placeholder="8 caractères minimum" autocomplete="new-password" required />
          <button class="pw-toggle" type="button" id="toggle-pw" aria-label="Afficher le mot de passe">Afficher</button>
        </div>
      </div>

      <div class="field">
        <label for="password-confirm">Confirmer le mot de passe</label>
        <input id="password-confirm" name="password-confirm" type="password" placeholder="Répète le mot de passe" autocomplete="new-password" required />
      </div>

      <div class="auth-error" id="error" role="alert" aria-live="polite"></div>
      <button class="btn-primary" type="submit">S'inscrire</button>
      <div class="auth-link">Déjà un compte ? <a href="/login">Se connecter</a></div>
      <div class="auth-back"><a href="/">← Retour au site</a></div>
    </form>
  </main>

  <script>
    const pw = document.getElementById("password");
    document.getElementById("toggle-pw").addEventListener("click", (e) => {
      const show = pw.type === "password";
      pw.type = show ? "text" : "password";
      e.target.textContent = show ? "Masquer" : "Afficher";
      e.target.setAttribute("aria-label", show ? "Masquer le mot de passe" : "Afficher le mot de passe");
    });

    document.getElementById("register-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const err = document.getElementById("error");
      const btn = e.target.querySelector("button[type=submit]");
      err.textContent = "";
      const p = pw.value, pc = document.getElementById("password-confirm").value;
      if (p !== pc) { err.textContent = "Les mots de passe ne correspondent pas."; return; }
      btn.disabled = true; btn.textContent = "Création…";
      try {
        const r = await fetch("/api/auth/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username: document.getElementById("username").value,
            password: p,
            password_confirm: pc,
          }),
        });
        if (r.ok) { location.href = "/app"; return; }
        const d = await r.json().catch(() => ({}));
        err.textContent = d.detail || "Inscription impossible";
      } catch {
        err.textContent = "Réseau indisponible. Réessaie.";
      } finally {
        btn.disabled = false; btn.textContent = "S'inscrire";
      }
    });
  </script>
</body>
</html>
